name: Node.js CI

# Se ejecuta cuando se hace push o pull request a la rama main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    # Ubuntu maneja procesos en segundo plano de forma confiable
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v2

      # Paso 2: Configurar Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      # Paso 3: Instalar dependencias de Playwright
      - name: Install dependencies
        run: npm install
        working-directory: ui-testing-clase

      # Paso 4: Instalar los navegadores que usa Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: ui-testing-clase

      # Paso 5: Levantar el servidor en segundo plano y esperar a que esté listo
      - name: Start local server
        run: |
          npx serve activity -p 3000 -n &
          npx wait-on http://localhost:3000 --timeout 15000
        working-directory: ui-testing-clase/..

      # Paso 6: Ejecutar los tests de Playwright
      - name: Run Playwright tests
        run: npx playwright test test/ejercicio.spec.ts
        working-directory: ui-testing-clase